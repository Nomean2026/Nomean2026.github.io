name: Scan GitHub Pages
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Discover Pages repos
        id: scan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Scanning for GitHub Pages repositories..."

          # Use Node.js to collect results
          node << 'SCRIPT'
          const { execSync } = require('child_process');

          function gh(args) {
            return execSync(`gh api ${args} --jq . 2>/dev/null || true`, { encoding: 'utf8' }).trim();
          }

          // Get all repos
          const reposRaw = gh('users/Nomean2026/repos?per_page=100&type=owner&sort=updated');
          let repos;
          try { repos = JSON.parse(reposRaw); } catch { repos = []; }

          const pages = [];

          for (const repo of repos) {
            if (repo.fork) continue;
            const name = repo.name;
            // Check Pages status
            const pagesRaw = gh(`repos/Nomean2026/${name}/pages`);
            if (pagesRaw && pagesRaw !== 'null' && !pagesRaw.includes('Not Found') && !pagesRaw.includes('"message"')) {
              pages.push({
                name: repo.name,
                description: repo.description || '',
                language: repo.language || '',
                stargazers_count: repo.stargazers_count || 0,
                updated_at: repo.updated_at || ''
              });
              console.log(`✅ ${name} - Pages enabled`);
            } else {
              console.log(`❌ ${name} - No Pages`);
            }
          }

          const fs = require('fs');
          fs.writeFileSync('.pages.json', JSON.stringify(pages, null, 2));
          console.log(`\n📦 Total Pages repos found: ${pages.length}`);
          SCRIPT

      - name: Commit .pages.json if changed
        run: |
          if [ -f .pages.json ]; then
            git config user.name "pages-scanner[bot]"
            git config user.email "pages-scanner[bot]@users.noreply.github.com"
            git add -A
            if git diff --cached --quiet; then
              echo "No changes"
            else
              git commit -m "chore: update .pages.json [skip ci]"
              git push
              echo "✅ .pages.json updated"
            fi
          fi